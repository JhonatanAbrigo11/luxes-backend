services:
  db:
    image: postgres:15-alpine
    container_name: luxes-db-dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-luxes}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-luxes123}
      POSTGRES_DB: ${DB_NAME:-luxes_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: luxes-backend-dev
    volumes:
      - ./src:/app/src
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET:-luxes-dev-secret-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: http://localhost:5173
      DATABASE_URL: postgresql://${DB_USER:-luxes}:${DB_PASSWORD:-luxes123}@db:5432/${DB_NAME:-luxes_dev}?schema=public
    depends_on:
      - db

  frontend:
    build:
      context: ../luxes-frontend
      dockerfile: Dockerfile.dev
    container_name: luxes-frontend-dev
    volumes:
      - ../luxes-frontend/src:/app/src
      - ../luxes-frontend/public:/app/public
      - ../luxes-frontend/index.html:/app/index.html
      - ../luxes-frontend/vite.config.js:/app/vite.config.js
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:3000
    depends_on:
      - backend

volumes:
  postgres_data:

